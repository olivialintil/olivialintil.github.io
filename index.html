<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lintil — The knowledge base built for architecture practices</title>
  <meta name="description" content="Your practice knows a lot. Lintil makes sure you don't forget it. The knowledge base built for architecture practices.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --paper:      #FAFAF7;
      --sand-light: #F4F1EA;
      --sand:       #E8DCC4;
      --ink:        #1A1A18;
      --sage:       #8A9187;
    }

    html, body { height: 100%; }

    body {
      background-color: var(--paper);
      color: var(--ink);
      font-family: 'Geist', 'Helvetica Neue', Helvetica, sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    .bg-rule {
      position: fixed;
      top: 0;
      right: clamp(60px, 12vw, 160px);
      width: 1px;
      height: 100vh;
      background: var(--sand);
      opacity: 0.6;
      display: none;
    }

    @media (min-width: 700px) {
      .bg-rule { display: block; }
    }

    .bg-rule-h {
      position: fixed;
      bottom: clamp(72px, 10vh, 112px);
      left: clamp(32px, 8vw, 120px);
      right: clamp(60px, 12vw, 160px);
      height: 1px;
      background: var(--sand);
      opacity: 0.5;
      display: none;
    }

    @media (min-width: 700px) {
      .bg-rule-h { display: block; }
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(48px, 8vw, 120px) clamp(32px, 8vw, 120px);
      position: relative;
      z-index: 1;
      max-width: 860px;
    }

    .wordmark {
      margin-bottom: clamp(48px, 8vh, 96px);
      animation: fadeUp 0.7s ease both;
      animation-delay: 0.05s;
    }

    .wordmark-rule {
      display: block;
      width: 32px;
      height: 1px;
      background: var(--ink);
      margin-bottom: 7px;
    }

    .wordmark-text {
      font-weight: 500;
      font-size: 16px;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    h1 {
      font-weight: 300;
      font-size: clamp(36px, 6vw, 72px);
      line-height: 1.06;
      letter-spacing: -0.03em;
      color: var(--ink);
      max-width: 18ch;
      margin-bottom: clamp(16px, 2.5vh, 28px);
      animation: fadeUp 0.7s ease both;
      animation-delay: 0.2s;
    }

    h1 span {
      color: var(--sage);
    }

    .sub {
      font-weight: 300;
      font-size: clamp(14px, 1.4vw, 16px);
      line-height: 1.65;
      color: var(--ink);
      opacity: 0.55;
      max-width: 42ch;
      margin-bottom: clamp(32px, 5vh, 52px);
      animation: fadeUp 0.7s ease both;
      animation-delay: 0.32s;
      letter-spacing: -0.01em;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: clamp(28px, 4vh, 44px);
      animation: fadeUp 0.7s ease both;
      animation-delay: 0.32s;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--sage);
      animation: pulse 2.4s ease-in-out infinite;
    }

    .status-text {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--sage);
    }

    .capture {
      animation: fadeUp 0.7s ease both;
      animation-delay: 0.46s;
    }

    .capture-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--sage);
      margin-bottom: 12px;
      display: block;
    }

    .capture-row {
      display: flex;
      max-width: 400px;
    }

    .capture-input {
      flex: 1;
      font-family: 'Geist', 'Helvetica Neue', Helvetica, sans-serif;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: -0.01em;
      color: var(--ink);
      background: transparent;
      border: 1px solid var(--sand);
      border-right: none;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s ease;
      -webkit-appearance: none;
      border-radius: 0;
    }

    .capture-input::placeholder {
      color: var(--sage);
      opacity: 0.6;
    }

    .capture-input:focus {
      border-color: var(--sage);
    }

    .capture-btn {
      font-family: 'Geist', 'Helvetica Neue', Helvetica, sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--paper);
      background: var(--ink);
      border: 1px solid var(--ink);
      padding: 11px 20px;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
      -webkit-appearance: none;
      border-radius: 0;
      white-space: nowrap;
    }

    .capture-btn:hover { background: var(--sage); border-color: var(--sage); }
    .capture-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .capture-note {
      font-size: 11px;
      color: var(--sage);
      margin-top: 10px;
      letter-spacing: 0.01em;
      min-height: 16px;
    }

    .capture-note.success { color: var(--ink); }
    .capture-note.error   { color: #a05050; }

    footer {
      padding: clamp(24px, 4vh, 40px) clamp(32px, 8vw, 120px);
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      animation: fadeUp 0.7s ease both;
      animation-delay: 0.6s;
    }

    .footer-copy {
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--sage);
    }

    .reveal-mark {
      width: 18px;
      height: 12px;
      position: relative;
      opacity: 0.28;
    }

    .reveal-mark::before,
    .reveal-mark::after {
      content: '';
      position: absolute;
      bottom: 0;
      width: 1px;
      height: 8px;
      background: var(--ink);
    }

    .reveal-mark::before { left: 4px; }
    .reveal-mark::after  { right: 4px; }

    .reveal-mark-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: var(--ink);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    @media (max-width: 600px) {
      .capture-row { flex-direction: column; }
      .capture-input { border-right: 1px solid var(--sand); border-bottom: none; }
      footer { flex-direction: column; align-items: flex-start; gap: 16px; }
    }
  </style>

  <link rel="icon" type="image/svg+xml" href="favicon.svg">

</head>
<body>

  <div class="bg-rule" aria-hidden="true"></div>
  <div class="bg-rule-h" aria-hidden="true"></div>

  <main>
    <div class="wordmark">
      <span class="wordmark-rule"></span>
      <span class="wordmark-text">lintil</span>
    </div>

   <h1>Your practice knows a lot.<br><span>Lintil makes sure you don't forget it.</span></h1>

    <p class="sub">
    Built by architects, for architects.
    </p>

    <div class="status">
      <span class="status-dot"></span>
      <span class="status-text">In development &mdash; UK launch 2026</span>
    </div>

    <div class="capture">
      <span class="capture-label">Be the first to know</span>
      <div class="capture-row">
        <input
          type="email"
          class="capture-input"
          id="email-input"
          placeholder="your@practice.com"
          autocomplete="email"
        >
        <button class="capture-btn" id="submit-btn" onclick="handleSubmit()">
          Notify me
        </button>
      </div>
      <p class="capture-note" id="capture-note">No spam. One email when we launch.</p>
    </div>
  </main>

  <footer>
    <span class="footer-copy">Built for architecture practices &nbsp;·&nbsp; lintil.app</span>
    <div class="reveal-mark" aria-hidden="true">
      <div class="reveal-mark-top"></div>
    </div>
  </footer>

  <script>
    async function handleSubmit() {
      const input  = document.getElementById('email-input');
      const btn    = document.getElementById('submit-btn');
      const note   = document.getElementById('capture-note');
      const email  = input.value.trim();

      if (!email || !email.includes('@')) {
        note.textContent = 'Please enter a valid email address.';
        note.className = 'capture-note error';
        return;
      }

      btn.disabled = true;
      btn.textContent = '...';
      note.textContent = '';
      note.className = 'capture-note';

      try {
        const res = await fetch('https://api.buttondown.email/v1/subscribers', {
          method: 'POST',
          headers: {
            'Authorization': 'Token dc129ae0-bc5c-426c-bd6b-7f566b050e90',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email_address: email })
        });

        if (res.status === 201 || res.ok) {
          input.value = '';
          note.textContent = "You're on the list. We'll be in touch.";
          note.className = 'capture-note success';
          btn.textContent = 'Done';
        } else if (res.status === 400) {
          note.textContent = 'That email is already on the list.';
          note.className = 'capture-note';
          btn.disabled = false;
          btn.textContent = 'Notify me';
        } else {
          throw new Error();
        }
      } catch {
        note.textContent = 'Something went wrong. Email us at hello@lintil.app';
        note.className = 'capture-note error';
        btn.disabled = false;
        btn.textContent = 'Notify me';
      }
    }

    document.getElementById('email-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSubmit();
    });
  </script>

</body>
</html>
